[package]
name = "splint"
version = "0.1.0"
edition.workspace = true

[features]
serde = ["dep:serde"]

[dependencies]
swipl-sys = { path = "../swipl-sys" }
thiserror = "2.0.18"
serde = { version = "1", optional = true, default-features = false, features = ["std"] }

[dev-dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[[test]]
name = "serde"
path = "tests/serde.rs"
required-features = ["serde"]

[[test]]
name = "record_session"
path = "tests/record_session.rs"
required-features = ["serde"]
